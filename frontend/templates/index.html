
<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitSense AI Coach</title>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
    text-align:center;
    font-family:Arial;
    background:#111;
    color:white;
}

h1{
    margin:10px;
}

#canvas{
    width:100%;
    max-width:400px;
    border-radius:12px;
    display:block;
    margin:auto;
    background:black;
}

button{
    padding:10px;
    margin:5px;
    width:40%;
    max-width:180px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

#description{
    max-width:400px;
    margin:auto;
    padding:10px;
    font-size:16px;
    line-height:1.5;
    color:#ddd;
}

</style>

</head>

<body>

<h1>AI Fitness Coach</h1>

<h2>
Exercise:
<span id="exercise">bicep</span>
</h2>

<h2>
Reps:
<span id="counter">0</span>
</h2>

<h3>
Stage:
<span id="stage">down</span>
</h3>

<!-- คำอธิบายท่า -->
<p id="description">

Bicep Curl:
งอแขนขึ้นลง เพื่อฝึกกล้ามเนื้อแขนหน้า
ช่วยเพิ่มความแข็งแรงของแขนและการจับยก

</p>

<!-- video hidden -->
<video
    id="video"
    autoplay
    playsinline
    muted
    style="display:none;">
</video>

<canvas id="canvas"></canvas>

<br>

<button onclick="setExercise('bicep')">
Bicep
</button>

<button onclick="setExercise('shoulder')">
Shoulder
</button>

<button onclick="setExercise('lateral')">
Lateral
</button>

<button onclick="setExercise('squat')">
Squat
</button>

<br><br>

<button onclick="startCamera()">
📷 Start Camera
</button>

<script>

// =========================
// ตัวแปร
// =========================

let exercise = "bicep";
let counter = 0;
let stage = "down";

// =========================
// เปลี่ยนท่า
// =========================

function setExercise(name){

    exercise = name;

    counter = 0;

    stage = "down";

    document.getElementById("exercise").innerText = name;

    // คำอธิบายแต่ละท่า
    let desc = "";

    // =====================
    // BICEP
    // =====================

    if(name === "bicep"){

        desc = `
        Bicep Curl:
        งอแขนขึ้นลง เพื่อฝึกกล้ามเนื้อแขนหน้า
        ช่วยเพิ่มความแข็งแรงของแขนและการจับยก
        `;
    }

    // =====================
    // SHOULDER
    // =====================

    else if(name === "shoulder"){

        desc = `
        Shoulder Press:
        ดันแขนขึ้นเหนือศีรษะ
        ช่วยฝึกกล้ามเนื้อหัวไหล่และต้นแขน
        `;
    }

    // =====================
    // LATERAL
    // =====================

    else if(name === "lateral"){

        desc = `
        Lateral Raise:
        ยกแขนออกด้านข้าง
        ช่วยเพิ่มความกว้างและความแข็งแรงของหัวไหล่
        `;
    }

    // =====================
    // SQUAT
    // =====================

    else if(name === "squat"){

        desc = `
        Squat:
        ย่อตัวลงและลุกขึ้น
        ช่วยฝึกต้นขา สะโพก และก้น
        `;
    }

    document.getElementById("description").innerText = desc;
}

// =========================
// คำนวณมุม
// =========================

function calcAngle(a,b,c){

    let radians =
        Math.atan2(c.y - b.y, c.x - b.x)
        -
        Math.atan2(a.y - b.y, a.x - b.x);

    let angle = Math.abs(
        radians * 180.0 / Math.PI
    );

    if(angle > 180){
        angle = 360 - angle;
    }

    return angle;
}

// =========================
// MediaPipe Pose
// =========================

const pose = new Pose({

    locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({

    modelComplexity: 1,

    smoothLandmarks: true,

    minDetectionConfidence: 0.5,

    minTrackingConfidence: 0.5
});

pose.onResults(onResults);

// =========================
// canvas + video
// =========================

const video = document.getElementById("video");

const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d");

// =========================
// วาดผลลัพธ์
// =========================

function onResults(results){

    if(!results.image) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(
        results.image,
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(!results.poseLandmarks) return;

    const lm = results.poseLandmarks;

    // =====================
    // วาด skeleton
    // =====================

    drawConnectors(
        ctx,
        lm,
        POSE_CONNECTIONS,
        {
            color:"#00FF00",
            lineWidth:4
        }
    );

    drawLandmarks(
        ctx,
        lm,
        {
            color:"#FF0000",
            lineWidth:2
        }
    );

    // =====================
    // Counter
    // =====================

    let angle = 0;

    // BICEP
    if(exercise === "bicep"){

        angle = calcAngle(
            lm[12],
            lm[14],
            lm[16]
        );

        if(angle > 160){
            stage = "down";
        }

        if(angle < 40 && stage === "down"){

            stage = "up";

            counter++;
        }
    }

    // SHOULDER
    else if(exercise === "shoulder"){

        angle = calcAngle(
            lm[12],
            lm[14],
            lm[16]
        );

        if(angle > 150){
            stage = "down";
        }

        if(angle < 60 && stage === "down"){

            stage = "up";

            counter++;
        }
    }

    // LATERAL
    else if(exercise === "lateral"){

        angle = calcAngle(
            lm[11],
            lm[13],
            lm[15]
        );

        if(angle > 150){
            stage = "down";
        }

        if(angle < 70 && stage === "down"){

            stage = "up";

            counter++;
        }
    }

    // SQUAT
    else if(exercise === "squat"){

        const knee = calcAngle(
            lm[23],
            lm[25],
            lm[27]
        );

        if(knee > 160){
            stage = "up";
        }

        if(knee < 90 && stage === "up"){

            stage = "down";

            counter++;
        }
    }

    // =====================
    // update UI
    // =====================

    document.getElementById("counter").innerText = counter;

    document.getElementById("stage").innerText = stage;
}

// =========================
// เปิดกล้อง
// =========================

async function startCamera(){

    try{

        // ขอ permission กล้อง
        const stream =
            await navigator.mediaDevices.getUserMedia({

                video:{
                    facingMode:"user"
                },

                audio:false
            });

        // ใส่ stream
        video.srcObject = stream;

        // รอโหลด metadata
        video.onloadedmetadata = async () => {

            // play video
            await video.play();

            // set canvas size
            canvas.width = video.videoWidth;

            canvas.height = video.videoHeight;

            // loop detection
            async function detect(){

                await pose.send({
                    image: video
                });

                requestAnimationFrame(detect);
            }

            detect();

            console.log("Camera started");
        };

    }
    catch(err){

        console.log(err);

        alert(
            "เปิดกล้องไม่ได้: "
            + err.message
        );
    }
}

</script>

</body>
</html>
